user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    upstream flowable_backend {
        server flowable:8080;
    }

    server {
        listen 80;
        server_name _;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Serve OpenAPI spec
        location /openapi.yaml {
            root /usr/share/nginx/html;
            types {
                application/x-yaml yaml yml;
            }
            try_files /openapi.yaml =404;
        }

        # Serve landing page at root
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # Serve static files from index.html directory
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            root /usr/share/nginx/html;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # Reverse proxy to Flowable REST API
        location ~ ^/flowable-rest/ {
            proxy_pass http://flowable_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;

            # Pass through authentication headers
            proxy_pass_request_headers on;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Redirect /flowable-rest to /flowable-rest/
        location /flowable-rest {
            return 301 /flowable-rest/;
        }

        # Default: redirect to landing page
        location / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }
    }
}

