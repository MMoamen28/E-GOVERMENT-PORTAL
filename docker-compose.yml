version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: egov-postgres
    environment:
      POSTGRES_USER: egov_user
      POSTGRES_PASSWORD: egov_password
      POSTGRES_DB: egov_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - egov-network
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: egov-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/egov_db
      KC_DB_USERNAME: egov_user
      KC_DB_PASSWORD: egov_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - egov-network

networks:
  egov-network:
    driver: bridge

volumes:
  pgdata: