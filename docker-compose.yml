version: "3.8"

services:
  egov-postgres:
    image: postgres:15-alpine
    container_name: egov-postgres
    environment:
      POSTGRES_USER: egov_user
      POSTGRES_PASSWORD: egov_pass
      POSTGRES_DB: egov_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - egov-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egov_user -d egov_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  egov-keycloak:
    image: keycloak/keycloak:23.0.0
    container_name: egov-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      egov-postgres:
        condition: service_healthy
    networks:
      - egov-network

  egov-gorules:
    image: gorules/brms:latest
    container_name: egov-gorules
    ports:
      - "8090:8090"
    networks:
      - egov-network

  egov-flowable:
    image: flowable/flowable-rest:6.8.0
    container_name: egov-flowable
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://egov-postgres:5432/egov_db
      SPRING_DATASOURCE_USERNAME: egov_user
      SPRING_DATASOURCE_PASSWORD: egov_pass
    ports:
      - "8082:8080"
    depends_on:
      egov-postgres:
        condition: service_healthy
    networks:
      - egov-network

  egov-nestjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: egov-nestjs
    env_file:
      - .env
    environment:
      DB_HOST: egov-postgres
      DB_PORT: 5432
      DB_USER: egov_user
      DB_PASS: egov_pass
      DB_NAME: egov_db
      KEYCLOAK_URL: http://egov-keycloak:8080
      KEYCLOAK_REALM: egov-portal
      KEYCLOAK_CLIENT_ID: egov-portal-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      GORULES_URL: http://egov-gorules:8090
      FLOWABLE_URL: http://egov-flowable:8080
      FLOWABLE_USER: rest-admin
      FLOWABLE_PASS: test
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
    ports:
      - "3000:3000"
    depends_on:
      egov-postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - egov-network

  egov-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: egov-frontend
    ports:
      - "80:80"
    depends_on:
      - egov-nestjs
    networks:
      - egov-network

  app:
    build: .
    container_name: e_gov_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: egov_user
      DATABASE_PASSWORD: egov_pass
      DATABASE_NAME: e_gov_portal
      KEYCLOAK_ISSUER: http://localhost:8080/realms/e-gov-portal
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/realms/e-gov-portal
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/e-gov-portal/protocol/openid-connect/certs
      FLOWABLE_URL: http://flowable-web/flowable-rest/service
      FLOWABLE_USER: admin
      FLOWABLE_PASS: test
    depends_on:
      - postgres
      - keycloak
      - flowable-web

  flowable:
    image: flowable/flowable-rest:6.8.0
    container_name: e_gov_flowable
    restart: always
    environment:
      spring.datasource.url: jdbc:postgresql://postgres:5432/e_gov_portal
      spring.datasource.username: egov_user
      spring.datasource.password: egov_pass
      spring.datasource.driver-class-name: org.postgresql.Driver
      flowable.rest.app.admin.user-id: admin
      flowable.rest.app.admin.password: test
      flowable.common.app.idm-url: http://flowable:8080/flowable-idm
    depends_on:
      - postgres

  flowable-web:
    image: nginx:latest
    container_name: e_gov_flowable_web
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./flowable/index.html:/usr/share/nginx/html/index.html:ro
      - ./flowable/openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
      - ./flowable/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flowable

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.10.0
    container_name: e_gov_swagger_ui
    restart: always
    ports:
      - "8091:8080"
    environment:
      SWAGGER_JSON: /swagger/openapi.yaml
      BASE_URL: /
      SWAGGER_UI_BUNDLE_JS: /swagger-ui-bundle.js
      SWAGGER_UI_STANDALONE_PRESET_JS: /swagger-ui-standalone-preset.js
    volumes:
      - ./flowable/openapi.yaml:/swagger/openapi.yaml:ro
    depends_on:
      - flowable-web
      - app

volumes:
  postgres_data:

networks:
  egov-network:
    driver: bridge
