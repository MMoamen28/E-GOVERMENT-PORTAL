version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: e_gov_postgres
    restart: always
    environment:
      POSTGRES_USER: egov_user
      POSTGRES_PASSWORD: egov_pass
      POSTGRES_DB: e_gov_portal
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:21.1.1
    container_name: e_gov_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

  app:
    build: .
    container_name: e_gov_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: egov_user
      DATABASE_PASSWORD: egov_pass
      DATABASE_NAME: e_gov_portal
      KEYCLOAK_ISSUER: http://localhost:8080/realms/e-gov-portal
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080/realms/e-gov-portal
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/e-gov-portal/protocol/openid-connect/certs
      FLOWABLE_URL: http://flowable-web/flowable-rest/service
      FLOWABLE_USER: admin
      FLOWABLE_PASS: test
    depends_on:
      - postgres
      - keycloak
      - flowable-web

  flowable:
    image: flowable/flowable-rest:6.8.0
    container_name: e_gov_flowable
    restart: always
    environment:
      spring.datasource.url: jdbc:postgresql://postgres:5432/e_gov_portal
      spring.datasource.username: egov_user
      spring.datasource.password: egov_pass
      spring.datasource.driver-class-name: org.postgresql.Driver
      flowable.rest.app.admin.user-id: admin
      flowable.rest.app.admin.password: test
      flowable.common.app.idm-url: http://flowable:8080/flowable-idm
    depends_on:
      - postgres

  flowable-web:
    image: nginx:latest
    container_name: e_gov_flowable_web
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./flowable/index.html:/usr/share/nginx/html/index.html:ro
      - ./flowable/openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
      - ./flowable/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flowable

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.10.0
    container_name: e_gov_swagger_ui
    restart: always
    ports:
      - "8091:8080"
    environment:
      SWAGGER_JSON: /swagger/openapi.yaml
      BASE_URL: /
      SWAGGER_UI_BUNDLE_JS: /swagger-ui-bundle.js
      SWAGGER_UI_STANDALONE_PRESET_JS: /swagger-ui-standalone-preset.js
    volumes:
      - ./flowable/openapi.yaml:/swagger/openapi.yaml:ro
    depends_on:
      - flowable-web
      - app

volumes:
  pgdata:
