version: '3.8'

services:
  egov-postgres:
    image: postgres:15-alpine
    container_name: egov-postgres
    environment:
      POSTGRES_USER: egov_user
      POSTGRES_PASSWORD: egov_pass
      POSTGRES_DB: egov_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - egov-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egov_user -d egov_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  egov-keycloak:
    image: keycloak/keycloak:23.0.0
    container_name: egov-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://egov-postgres:5432/egov_db
      KC_DB_USERNAME: egov_user
      KC_DB_PASSWORD: egov_pass
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      egov-postgres:
        condition: service_healthy
    networks:
      - egov-network

  egov-gorules:
    image: gorules/brms:latest
    container_name: egov-gorules
    ports:
      - "8090:8090"
    networks:
      - egov-network

  egov-flowable:
    image: flowable/flowable-rest:6.8.0
    container_name: egov-flowable
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://egov-postgres:5432/egov_db
      SPRING_DATASOURCE_USERNAME: egov_user
      SPRING_DATASOURCE_PASSWORD: egov_pass
    ports:
      - "8082:8080"
    depends_on:
      egov-postgres:
        condition: service_healthy
    networks:
      - egov-network

  egov-nestjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: egov-nestjs
    env_file:
      - .env
    environment:
      DB_HOST: egov-postgres
      DB_PORT: 5432
      DB_USER: egov_user
      DB_PASS: egov_pass
      DB_NAME: egov_db
      KEYCLOAK_URL: http://egov-keycloak:8080
      KEYCLOAK_REALM: egov-portal
      KEYCLOAK_CLIENT_ID: egov-portal-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      GORULES_URL: http://egov-gorules:8090
      FLOWABLE_URL: http://egov-flowable:8080
      FLOWABLE_USER: rest-admin
      FLOWABLE_PASS: test
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
    ports:
      - "3000:3000"
    depends_on:
      egov-postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - egov-network

  egov-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: egov-frontend
    ports:
      - "80:80"
    depends_on:
      - egov-nestjs
    networks:
      - egov-network

volumes:
  postgres_data:

networks:
  egov-network:
    driver: bridge
