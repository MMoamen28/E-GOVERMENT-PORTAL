<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Government Portal | Register</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: var(--bg-main); }
        .page-wrapper { min-height: 100vh; display: flex; flex-direction: column; }
        .auth-tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 2rem; }
        .auth-tab { flex: 1; padding: 0.8rem 1rem; text-align: center; font-weight: 600; cursor: pointer; color: var(--text-light); border-bottom: 3px solid transparent; text-decoration: none; }
        .auth-tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .alert-box { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; align-items: flex-start; gap: 0.75rem; font-size: 0.9rem; }
        .alert-box.success { background: rgba(5,150,105,0.1); color: #065f46; border: 1px solid #059669; }
        .alert-box.error { background: rgba(220,38,38,0.1); color: #991b1b; border: 1px solid #dc2626; }
        .field-error { color: #dc2626; font-size: 0.78rem; margin-top: 0.25rem; display: block; min-height: 1em; }
        .form-control.invalid { border-color: #dc2626; }
    </style>
</head>
<body>
<div class="page-wrapper">
    <nav class="navbar solid">
        <div class="nav-container">
            <a href="../index.html" class="logo"><i class="fas fa-landmark"></i> E-Gov Portal</a>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="services.html" class="nav-link">Services</a>
            </div>
        </div>
    </nav>
    <header class="page-header" style="padding-top:80px; padding-bottom:3rem;">
        <div class="container">
            <h1>Create Account</h1>
            <p>Join the digital citizen portal.</p>
        </div>
    </header>
    <section class="section">
        <div class="container">
            <div class="form-container">
                <div class="form-wrapper">
                    <div class="auth-tabs">
                        <a href="login.html" class="auth-tab">Login</a>
                        <a href="register.html" class="auth-tab active">Register</a>
                    </div>
                    <div id="alertBox" class="alert-box"></div>
                    <form id="registerForm" novalidate>
                        <div class="input-group">
                            <label class="form-label">First Name</label>
                            <input type="text" id="firstName" class="form-control" placeholder="Enter your first name">
                            <small class="field-error" id="err-firstName"></small>
                        </div>
                        <div class="input-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="lastName" class="form-control" placeholder="Enter your last name">
                            <small class="field-error" id="err-lastName"></small>
                        </div>
                        <div class="input-group">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" placeholder="Letters, numbers and _ only">
                            <small class="field-error" id="err-username"></small>
                        </div>
                        <div class="input-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="example@email.com">
                            <small class="field-error" id="err-email"></small>
                        </div>
                        <div class="input-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="At least 8 characters">
                            <small class="field-error" id="err-password"></small>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block" id="regBtn">Register</button>
                    </form>
                    <div id="successCard" style="display:none; text-align:center;">
                        <i class="fas fa-check-circle" style="font-size:3rem; color:#059669; margin-bottom:1rem;"></i>
                        <h2>Account Created!</h2>
                        <p>You can now log in.</p>
                        <a href="login.html" class="btn btn-primary" style="margin-top:1rem;">Go to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
<script>
function setError(fieldId, msg) {
    var errEl = document.getElementById('err-' + fieldId);
    var input = document.getElementById(fieldId);
    if (errEl) errEl.innerText = msg;
    if (input) input.classList.toggle('invalid', !!msg);
}
function clearErrors() {
    ['firstName','lastName','username','email','password'].forEach(function(f){ setError(f,''); });
}
function validate(data) {
    var nameRx = /^[A-Za-z\u0600-\u06FF][A-Za-z\u0600-\u06FF\s]{1,49}$/;
    var usernameRx = /^[A-Za-z0-9_]{3,30}$/;
    var emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    var valid = true;
    if (!data.firstName.trim()) { setError('firstName','First name is required.'); valid=false; }
    else if (!nameRx.test(data.firstName.trim())) { setError('firstName','Letters only, 2–50 characters.'); valid=false; }
    if (!data.lastName.trim()) { setError('lastName','Last name is required.'); valid=false; }
    else if (!nameRx.test(data.lastName.trim())) { setError('lastName','Letters only, 2–50 characters.'); valid=false; }
    if (!data.username.trim()) { setError('username','Username is required.'); valid=false; }
    else if (!usernameRx.test(data.username.trim())) { setError('username','3–30 chars, letters/numbers/_ only, no spaces.'); valid=false; }
    if (!data.email.trim()) { setError('email','Email is required.'); valid=false; }
    else if (!emailRx.test(data.email.trim())) { setError('email','Enter a valid email address.'); valid=false; }
    if (!data.password) { setError('password','Password is required.'); valid=false; }
    else if (data.password.length < 8) { setError('password','Password must be at least 8 characters.'); valid=false; }
    return valid;
}
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearErrors();
    var alertBox = document.getElementById('alertBox');
    var btn = document.getElementById('regBtn');
    alertBox.style.display = 'none';
    var data = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };
    if (!validate(data)) return;
    btn.disabled = true;
    btn.innerText = 'Creating account...';
    try {
        var res = await fetch('http://localhost:3000/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('successCard').style.display = 'block';
        } else {
            var err = await res.json();
            alertBox.innerText = err.message || 'Registration failed';
            alertBox.className = 'alert-box error';
            alertBox.style.display = 'flex';
        }
    } catch(e) {
        alertBox.innerText = 'Cannot connect to server. Check if NestJS is running.';
        alertBox.className = 'alert-box error';
        alertBox.style.display = 'flex';
    } finally {
        btn.disabled = false;
        btn.innerText = 'Register';
    }
});
</script>
</body>
</html>
