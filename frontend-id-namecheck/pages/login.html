<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Government Portal | Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: var(--bg-main); }
        .page-wrapper { min-height: 100vh; display: flex; flex-direction: column; }
        .auth-tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 2rem; }
        .auth-tab { flex: 1; padding: 0.8rem 1rem; text-align: center; font-weight: 600; cursor: pointer; color: var(--text-light); border-bottom: 3px solid transparent; text-decoration: none; }
        .auth-tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .alert-box { padding: 1rem; border-radius: 8px; margin-bottom: 1.25rem; display: none; align-items: flex-start; gap: 0.75rem; font-size: 0.9rem; }
        .alert-box.error { background: rgba(220,38,38,0.1); color: #991b1b; border: 1px solid #dc2626; }
    </style>
</head>
<body>
<div class="page-wrapper">
    <nav class="navbar solid">
        <div class="nav-container">
            <a href="../index.html" class="logo"><i class="fas fa-landmark"></i> E-Gov Portal</a>
        </div>
    </nav>
    <header class="page-header" style="padding-top:80px; padding-bottom:3rem;">
        <div class="container">
            <h1>Sign In</h1>
            <p>Access your digital services.</p>
        </div>
    </header>
    <section class="section">
        <div class="container">
            <div class="form-container">
                <div class="form-wrapper">
                    <div class="auth-tabs">
                        <a href="login.html" class="auth-tab active">Login</a>
                        <a href="register.html" class="auth-tab">Register</a>
                    </div>
                    <div id="alertBox" class="alert-box"></div>
                    <form id="loginForm">
                        <div class="input-group">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>
                        <div class="input-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</div>
<script>
function parseJwt(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        return null;
    }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    const btn = document.getElementById('loginBtn');
    
    const data = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };

    btn.disabled = true;
    btn.innerText = 'Signing in...';

    try {
        const res = await fetch('http://localhost:3000/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('access_token', data.access_token);
            
            // Decode role
            const decoded = parseJwt(data.access_token);
            if (decoded && decoded.realm_access && decoded.realm_access.roles) {
                const roles = decoded.realm_access.roles;
                let role = 'citizen';
                if (roles.includes('admin')) role = 'admin';
                else if (roles.includes('supervisor')) role = 'supervisor';
                localStorage.setItem('user_role', role);
            }
            
            window.location.href = 'id-renewal.html';
        } else {
            alertBox.innerText = 'Invalid username or password';
            alertBox.className = 'alert-box error';
            alertBox.style.display = 'flex';
        }
    } catch (err) {
        alertBox.innerText = 'Cannot connect to server. Check if NestJS is running.';
        alertBox.className = 'alert-box error';
        alertBox.style.display = 'flex';
    } finally {
        btn.disabled = false;
        btn.innerText = 'Sign In';
    }
});
</script>
</body>
</html>
